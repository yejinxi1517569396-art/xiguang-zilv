<!-- Generated by Trae Work -->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#F2F7FE">
  <title>汐光自律 · 登录注册</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="apple-touch-icon" href="assets/icons/icon.svg">
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
  <main class="app-shell fade-in">
    <section class="hero-card" style="margin-top:18px">
      <div class="hero-greet">欢迎来到汐光自律</div>
      <div class="hero-title">登录后，记录只属于你 ✨</div>
      <div class="hero-quote">当前版本为本地账号系统，数据保存在你的浏览器里，适合个人使用和 MVP 演示。</div>
    </section>

    <div class="ai-tab-row">
      <div class="ai-tab active" data-tab="login">登录</div>
      <div class="ai-tab" data-tab="register">注册</div>
    </div>

    <section class="card" id="loginPanel">
      <div class="card-title">
        <span class="card-title-text"><span class="icon"></span>登录账号</span>
      </div>
      <form class="review-form" id="loginForm" onsubmit="return false;">
        <div class="field">
          <label class="field-label"><span class="field-icon">👤</span>账号</label>
          <input type="text" name="account" placeholder="请输入邮箱或用户名">
        </div>
        <div class="field">
          <label class="field-label"><span class="field-icon">🔒</span>密码</label>
          <input type="password" name="password" placeholder="请输入密码">
        </div>
        <button class="btn-primary" id="loginBtn">登录</button>
      </form>
    </section>

    <section class="card" id="registerPanel" style="display:none">
      <div class="card-title">
        <span class="card-title-text"><span class="icon"></span>创建账号</span>
      </div>
      <form class="review-form" id="registerForm" onsubmit="return false;">
        <div class="field">
          <label class="field-label"><span class="field-icon">🌸</span>昵称</label>
          <input type="text" name="name" placeholder="例如：汐光女孩">
        </div>
        <div class="field">
          <label class="field-label"><span class="field-icon">👤</span>账号</label>
          <input type="text" name="account" placeholder="请输入邮箱或用户名">
        </div>
        <div class="field">
          <label class="field-label"><span class="field-icon">🔒</span>密码</label>
          <input type="password" name="password" placeholder="至少 6 位">
        </div>
        <button class="btn-primary" id="registerBtn">注册并登录</button>
      </form>
    </section>

    <section class="card">
      <div class="card-title">
        <span class="card-title-text"><span class="icon"></span>说明</span>
      </div>
      <p class="intro-text">
        这个登录注册版本不依赖服务器，适合部署在 GitHub Pages / Vercel 上直接使用。每个账号的数据会分开保存在当前浏览器中；如果换设备或清理浏览器缓存，数据不会自动同步。后续如需真正多人云端账号，可接入 Supabase、Firebase 或自建后端。
      </p>
    </section>
  </main>

  <script src="assets/js/app.js"></script>
  <script src="assets/js/ui.js"></script>
  <script>
    UI.injectShared('me');

    if (App.auth.isLoggedIn()) {
      location.href = 'me.html';
    }

    document.querySelectorAll('.ai-tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.ai-tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        const current = tab.dataset.tab;
        document.getElementById('loginPanel').style.display = current === 'login' ? '' : 'none';
        document.getElementById('registerPanel').style.display = current === 'register' ? '' : 'none';
      });
    });

    document.getElementById('loginBtn').addEventListener('click', () => {
      const form = document.getElementById('loginForm');
      const result = App.auth.login({
        account: form.account.value,
        password: form.password.value
      });
      if (!result.ok) {
        App.toast(result.message);
        return;
      }
      App.toast('登录成功，欢迎回来 🌷');
      setTimeout(() => location.href = 'me.html', 500);
    });

    document.getElementById('registerBtn').addEventListener('click', () => {
      const form = document.getElementById('registerForm');
      const result = App.auth.register({
        name: form.name.value,
        account: form.account.value,
        password: form.password.value
      });
      if (!result.ok) {
        App.toast(result.message);
        return;
      }
      App.toast('注册成功，已自动登录 🌷');
      setTimeout(() => location.href = 'me.html', 500);
    });
  </script>
</body>
</html>
