<!-- Generated by Trae Work -->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#F2F7FE">
  <title>汐光自律 · 每日打卡</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="apple-touch-icon" href="assets/icons/icon.svg">
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
  <main class="app-shell fade-in">
    <!-- 完成率小卡 -->
    <section class="card" id="rateCard"></section>

    <!-- 自定义习惯 -->
    <section class="card">
      <div class="card-title">
        <span class="card-title-text"><span class="icon"></span>自定义打卡习惯</span>
        <span class="card-action btn-link" id="applyHabitsBtn">↺ 把今日习惯加入清单</span>
      </div>
      <div class="habit-designer">
        <div class="row">
          <input type="text" id="habitName" placeholder="例如：背 30 个英文单词" maxlength="30">
          <div class="freq-toggle" id="freqToggle">
            <span class="opt active" data-v="daily">每天</span>
            <span class="opt" data-v="weekly">指定日</span>
          </div>
        </div>
        <div class="row">
          <span class="muted">图标：</span>
          <div class="emoji-picker" id="emojiPicker"></div>
        </div>
        <div class="row">
          <span class="muted">配色：</span>
          <div class="color-picker" id="colorPicker"></div>
        </div>
        <div class="row" id="weekdayRow" style="display:none">
          <span class="muted">周几：</span>
          <div class="weekday-picker" id="weekdayPicker"></div>
        </div>
        <button class="btn-primary" style="width:auto;padding:10px 18px;align-self:flex-start" id="addHabitBtn">+ 保存为我的习惯</button>
      </div>
      <div class="habit-list" id="habitList" style="margin-top:14px"></div>
    </section>

    <!-- 添加任务 -->
    <section class="card">
      <div class="card-title">
        <span class="card-title-text"><span class="icon"></span>添加任务</span>
      </div>
      <div class="add-task-row">
        <input id="taskInput" class="add-task-input" type="text" placeholder="例如：晨间冥想 10 分钟" maxlength="40">
        <button class="add-task-btn" id="addBtn">添加</button>
      </div>
      <div class="preset-tags" id="presetTags"></div>
    </section>

    <!-- 任务清单 -->
    <section class="card">
      <div class="card-title">
        <span class="card-title-text"><span class="icon"></span>今日任务清单</span>
        <span class="card-action" id="taskCount">0 项</span>
      </div>
      <ul class="task-list" id="taskList"></ul>
    </section>
  </main>

  <script src="assets/js/app.js"></script>
  <script src="assets/js/ui.js"></script>
  <script>
    UI.injectShared('checkin');

    // ============== 自定义习惯设计器 ==============
    const EMOJIS = ['✨','🌅','💧','🏃‍♀️','📖','✍️','🧘‍♀️','🌙','🌷','📚','🥗','💪','🎯','🌸','☀️','🌱','🍵','🧴'];
    const COLORS = ['#6FB1F0','#A8C8EC','#F4C9D5','#BFE4D9','#FFDDB0','#D5C5F0','#FFC7B8'];
    let pickedEmoji = '✨';
    let pickedColor = '#6FB1F0';
    let pickedFreq = 'daily';
    let pickedDays = new Set([1,2,3,4,5,6,7]);

    function renderEmojiPicker() {
      document.getElementById('emojiPicker').innerHTML = EMOJIS.map(e =>
        `<span class="emoji-pick ${e === pickedEmoji ? 'active' : ''}" data-v="${e}">${e}</span>`).join('');
    }
    function renderColorPicker() {
      document.getElementById('colorPicker').innerHTML = COLORS.map(c =>
        `<span class="color-pick ${c === pickedColor ? 'active' : ''}" data-v="${c}" style="background:${c}"></span>`).join('');
    }
    function renderWeekdayPicker() {
      const labels = ['一','二','三','四','五','六','日'];
      document.getElementById('weekdayPicker').innerHTML = labels.map((l, i) =>
        `<span class="weekday-pick ${pickedDays.has(i+1) ? 'active' : ''}" data-v="${i+1}">${l}</span>`).join('');
    }
    renderEmojiPicker(); renderColorPicker(); renderWeekdayPicker();

    document.getElementById('emojiPicker').addEventListener('click', e => {
      const el = e.target.closest('.emoji-pick'); if (!el) return;
      pickedEmoji = el.dataset.v;
      renderEmojiPicker();
    });
    document.getElementById('colorPicker').addEventListener('click', e => {
      const el = e.target.closest('.color-pick'); if (!el) return;
      pickedColor = el.dataset.v;
      renderColorPicker();
    });
    document.getElementById('freqToggle').addEventListener('click', e => {
      const el = e.target.closest('.opt'); if (!el) return;
      pickedFreq = el.dataset.v;
      document.querySelectorAll('#freqToggle .opt').forEach(o => o.classList.toggle('active', o.dataset.v === pickedFreq));
      document.getElementById('weekdayRow').style.display = (pickedFreq === 'weekly') ? '' : 'none';
    });
    document.getElementById('weekdayPicker').addEventListener('click', e => {
      const el = e.target.closest('.weekday-pick'); if (!el) return;
      const v = +el.dataset.v;
      if (pickedDays.has(v)) pickedDays.delete(v); else pickedDays.add(v);
      renderWeekdayPicker();
    });

    document.getElementById('addHabitBtn').addEventListener('click', () => {
      const name = document.getElementById('habitName').value.trim();
      if (!name) { App.toast('请填写习惯名称'); return; }
      App.addCustomHabit({
        name, emoji: pickedEmoji, color: pickedColor,
        freq: pickedFreq, weekdays: Array.from(pickedDays)
      });
      document.getElementById('habitName').value = '';
      App.toast('已保存为我的习惯 🌷');
      renderHabits();
    });

    function renderHabits() {
      const list = App.listCustomHabits();
      const ctn = document.getElementById('habitList');
      if (!list.length) {
        ctn.innerHTML = '<div class="muted" style="text-align:center;padding:8px">还没有自定义习惯，做一个属于你的小习惯吧 🌱</div>';
        return;
      }
      const dayLabels = ['一','二','三','四','五','六','日'];
      ctn.innerHTML = list.map(h => `
        <div class="habit-card" data-id="${h.id}">
          <div class="h-emoji" style="background:${h.color}33;color:${h.color}">${h.emoji}</div>
          <div class="h-info">
            <div class="h-name">${h.name}</div>
            <div class="h-meta">${h.freq === 'daily' ? '每天' : '周' + (h.weekdays || []).map(d => dayLabels[d-1]).join('/')}</div>
          </div>
          <button class="h-del" data-act="del">✕</button>
        </div>`).join('');
      ctn.querySelectorAll('.habit-card').forEach(c => {
        c.querySelector('[data-act="del"]').addEventListener('click', () => {
          if (confirm('确认删除该习惯？')) {
            App.deleteCustomHabit(c.dataset.id);
            renderHabits();
          }
        });
      });
    }
    renderHabits();

    document.getElementById('applyHabitsBtn').addEventListener('click', () => {
      const n = App.applyHabitsToToday();
      App.toast(n ? `已加入 ${n} 个习惯到今日清单` : '今日清单已包含全部习惯');
      renderAll();
    });

    // ============== 原任务列表逻辑 ==============
    const presets = [
      { name: '早起', emoji: '🌅' },
      { name: '喝水 8 杯', emoji: '💧' },
      { name: '运动 30 分钟', emoji: '🏃‍♀️' },
      { name: '阅读 30 分钟', emoji: '📖' },
      { name: '写作 / 日记', emoji: '✍️' },
      { name: '冥想 10 分钟', emoji: '🧘‍♀️' },
      { name: '早睡（23 点前）', emoji: '🌙' },
      { name: '护肤', emoji: '🌷' }
    ];

    function renderRate() {
      const r = App.todayRate();
      document.getElementById('rateCard').innerHTML = `
        <div class="progress-ring-wrap">
          ${UI.progressRing(r.rate, r.rate + '%', '完成率')}
          <div class="progress-info">
            <div class="big">${App.fmt.dateLabel()}</div>
            <div class="small">已完成 ${r.done} / ${r.total} 项 · ${r.rate >= 100 && r.total > 0 ? '今天全部完成啦 🌷' : '继续加油'}</div>
          </div>
        </div>
      `;
    }

    function renderPresets() {
      const ctn = document.getElementById('presetTags');
      const today = App.getTodayTasks();
      const exists = new Set(today.map(t => t.name));
      ctn.innerHTML = presets
        .filter(p => !exists.has(p.name))
        .map(p => `<span class="preset-tag" data-name="${p.name}" data-emoji="${p.emoji}">${p.emoji} ${p.name}</span>`)
        .join('') || '<span style="font-size:12px;color:var(--muted)">所有推荐任务都已添加 🌟</span>';

      ctn.querySelectorAll('.preset-tag').forEach(el => {
        el.addEventListener('click', () => {
          App.addTask(el.dataset.name, el.dataset.emoji);
          App.toast('已添加');
          renderAll();
        });
      });
    }

    function renderTasks() {
      const tasks = App.getTodayTasks();
      const list = document.getElementById('taskList');
      document.getElementById('taskCount').textContent = `${tasks.length} 项`;

      if (!tasks.length) {
        list.innerHTML = `<div class="empty-state">
          <span class="em-emoji">🌱</span>
          还没有任务，从上方选择推荐项或自定义添加吧
        </div>`;
        return;
      }
      list.innerHTML = tasks.map(t => `
        <li class="task-item ${t.done ? 'done' : ''}" data-id="${t.id}">
          <div class="task-check ${t.done ? 'checked' : ''}"></div>
          <div class="task-info">
            <div class="task-name"><span class="task-emoji">${t.emoji || '✨'}</span>${t.name}</div>
            <div class="task-meta">${t.done ? '✓ 已完成' : '点击左侧圆圈完成'}</div>
          </div>
          <button class="task-del" title="删除">✕</button>
        </li>
      `).join('');

      list.querySelectorAll('.task-item').forEach(item => {
        item.querySelector('.task-check').addEventListener('click', () => {
          App.toggleTask(item.dataset.id);
          renderAll();
        });
        item.querySelector('.task-del').addEventListener('click', e => {
          e.stopPropagation();
          if (confirm('确认删除该任务？')) {
            App.deleteTask(item.dataset.id);
            App.toast('已删除');
            renderAll();
          }
        });
      });
    }

    function renderAll() {
      renderRate();
      renderPresets();
      renderTasks();
    }

    // 添加按钮
    const input = document.getElementById('taskInput');
    document.getElementById('addBtn').addEventListener('click', () => {
      const v = input.value.trim();
      if (!v) { App.toast('请输入任务内容'); return; }
      App.addTask(v, '✨');
      input.value = '';
      App.toast('已添加');
      renderAll();
    });
    input.addEventListener('keydown', e => {
      if (e.key === 'Enter') document.getElementById('addBtn').click();
    });

    renderAll();
  </script>
</body>
</html>
