<!-- Generated by Trae Work -->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#F2F7FE">
  <title>汐光自律 · 社区</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="apple-touch-icon" href="assets/icons/icon.svg">
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
  <main class="app-shell fade-in">
    <!-- 子页签 -->
    <div class="sub-tabs" id="subTabs">
      <div class="sub-tab active" data-tab="feed">🌷 帖子广场</div>
      <div class="sub-tab" data-tab="rank">🏆 排行榜</div>
      <div class="sub-tab" data-tab="buddy">🤝 我的搭子</div>
      <div class="sub-tab" data-tab="couple">💑 情侣空间</div>
    </div>

    <!-- 帖子广场 -->
    <section id="paneFeed" class="pane">
      <div class="card post-composer">
        <div class="card-title">
          <span class="card-title-text"><span class="icon"></span>分享你的小心情</span>
        </div>
        <textarea id="postText" placeholder="今天的小确幸 / 卡住你的事情 / 一句鼓励自己的话…"></textarea>
        <div class="composer-bar">
          <div class="mood-row" id="moodRow">
            <span class="mood-chip" data-mood="🥰">🥰</span>
            <span class="mood-chip" data-mood="😊">😊</span>
            <span class="mood-chip" data-mood="😌">😌</span>
            <span class="mood-chip" data-mood="🙂">🙂</span>
            <span class="mood-chip" data-mood="😔">😔</span>
          </div>
          <button class="btn-primary" style="width:auto;padding:8px 18px" id="postBtn">发布</button>
        </div>
      </div>

      <div id="feedList"></div>
    </section>

    <!-- 排行榜 -->
    <section id="paneRank" class="pane" style="display:none">
      <div class="card">
        <div class="card-title">
          <span class="card-title-text"><span class="icon"></span>本周排行榜</span>
          <span class="card-action muted">按 连续天数 × 10 + 今日完成率 计算</span>
        </div>
        <div class="leaderboard" id="leaderboard"></div>
      </div>
    </section>

    <!-- 搭子 -->
    <section id="paneBuddy" class="pane" style="display:none">
      <div class="card">
        <div class="card-title">
          <span class="card-title-text"><span class="icon"></span>我的搭子</span>
          <span class="card-action btn-link" id="addBuddyBtn">+ 添加搭子</span>
        </div>
        <p class="intro-text" style="margin-bottom:10px">和朋友互相监督打卡，一起坚持，一起变好 🌷</p>
        <div class="buddy-grid" id="buddyList"></div>
      </div>
    </section>

    <!-- 情侣空间 -->
    <section id="paneCouple" class="pane" style="display:none">
      <div class="card" style="background: linear-gradient(135deg, #FFF0F5 0%, #FFF8FC 60%, #F0F6FE 100%);">
        <div class="card-title">
          <span class="card-title-text"><span class="icon"></span>情侣打卡</span>
        </div>
        <p class="intro-text" style="margin-bottom:10px">和 TA 一起完成今日打卡，把日常的浪漫变成习惯 💑</p>
        <div id="coupleArea"></div>
      </div>
    </section>
  </main>

  <!-- 添加搭子 / 情侣 弹窗 -->
  <div class="modal-overlay" id="buddyModal">
    <div class="modal">
      <div class="modal-title" id="buddyModalTitle">🤝 添加搭子</div>
      <div class="modal-text">
        你可以创建一个邀请码邀请朋友，或者输入对方的邀请码来绑定。<br>
        <span style="font-size:12px;color:var(--muted)">本地版本会模拟绑定一个搭子，未来可接入云同步。</span>
      </div>

      <div class="field" style="margin-bottom:10px">
        <label class="field-label">TA 的称呼</label>
        <input type="text" id="buddyName" placeholder="例如：小桃 / 我的爱人" style="background:var(--surface-2);border:1px solid var(--rule);border-radius:var(--r-md);padding:10px 12px;font-size:13px;outline:none">
      </div>

      <div class="field" style="margin-bottom:14px">
        <label class="field-label">邀请码（输入对方邀请码以绑定）</label>
        <input type="text" id="buddyCode" placeholder="例如：XGAB12CD（留空则只创建本地搭子）" style="background:var(--surface-2);border:1px solid var(--rule);border-radius:var(--r-md);padding:10px 12px;font-size:13px;outline:none;text-transform:uppercase;letter-spacing:1px">
      </div>

      <div style="margin-bottom:14px">
        <div class="muted" style="margin-bottom:6px">我的邀请码（分享给 TA）</div>
        <div class="invite-code" id="myInviteCode">XG------</div>
        <button class="btn-link" style="margin-left:8px" id="newInviteBtn">换一个</button>
      </div>

      <div class="modal-actions">
        <button class="btn-secondary" id="buddyCancel">取消</button>
        <button class="btn-primary" style="width:auto;padding:8px 18px" id="buddySave">确认</button>
      </div>
    </div>
  </div>

  <script src="assets/js/app.js"></script>
  <script src="assets/js/ui.js"></script>
  <script>
    UI.injectShared('community');

    // ============== 子页签切换 ==============
    let activeTab = 'feed';
    const panes = { feed: 'paneFeed', rank: 'paneRank', buddy: 'paneBuddy', couple: 'paneCouple' };
    document.getElementById('subTabs').addEventListener('click', e => {
      const t = e.target.closest('.sub-tab');
      if (!t) return;
      activeTab = t.dataset.tab;
      document.querySelectorAll('#subTabs .sub-tab').forEach(x => x.classList.toggle('active', x === t));
      Object.entries(panes).forEach(([k, id]) => {
        document.getElementById(id).style.display = (k === activeTab) ? '' : 'none';
      });
      if (activeTab === 'rank') renderRank();
      if (activeTab === 'buddy') renderBuddy('friend');
      if (activeTab === 'couple') renderBuddy('couple');
    });

    // ============== 帖子广场 ==============
    let pickedMood = '';
    document.getElementById('moodRow').addEventListener('click', e => {
      const c = e.target.closest('.mood-chip');
      if (!c) return;
      const same = c.classList.contains('active');
      document.querySelectorAll('#moodRow .mood-chip').forEach(x => x.classList.remove('active'));
      if (!same) { c.classList.add('active'); pickedMood = c.dataset.mood; }
      else pickedMood = '';
    });

    document.getElementById('postBtn').addEventListener('click', () => {
      const text = document.getElementById('postText').value;
      if (!text.trim()) { App.toast('请先写点什么吧'); return; }
      App.createPost({ content: text, mood: pickedMood });
      document.getElementById('postText').value = '';
      pickedMood = '';
      document.querySelectorAll('#moodRow .mood-chip').forEach(x => x.classList.remove('active'));
      App.toast('已发布 🌸');
      renderFeed();
    });

    function timeAgo(ts) {
      const diff = Date.now() - ts;
      if (diff < 60000) return '刚刚';
      if (diff < 3600000) return Math.floor(diff/60000) + ' 分钟前';
      if (diff < 86400000) return Math.floor(diff/3600000) + ' 小时前';
      return Math.floor(diff/86400000) + ' 天前';
    }

    function renderFeed() {
      const list = App.listPosts();
      const me = App.auth.currentUser;
      const myUid = me ? me.id : 'guest';
      const ctn = document.getElementById('feedList');
      if (!list.length) {
        ctn.innerHTML = '<div class="empty-state"><span class="em-emoji">🌷</span>还没有帖子，来发第一条吧～</div>';
        return;
      }
      ctn.innerHTML = list.map(p => {
        const liked = p.likes.includes(myUid);
        return `
          <div class="post-card" data-id="${p.id}">
            <div class="post-head">
              <div class="post-avatar">${p.avatar || '🌸'}</div>
              <div>
                <div class="post-author">${p.author}</div>
                <div class="post-time">${timeAgo(p.createdAt)}</div>
              </div>
              ${p.mood ? `<div class="post-mood">${p.mood}</div>` : ''}
            </div>
            <div class="post-content">${escapeHtml(p.content)}</div>
            <div class="post-actions">
              <div class="post-action ${liked ? 'liked' : ''}" data-act="like">
                <span class="heart">${liked ? '❤️' : '🤍'}</span> <span>${p.likes.length}</span>
              </div>
              <div class="post-action" data-act="comment">
                💬 <span>${p.comments.length}</span>
              </div>
            </div>
            ${p.comments.length ? `
              <div class="post-comments">
                ${p.comments.map(c => `<div class="post-comment"><span class="name">${c.name}：</span>${escapeHtml(c.content)}</div>`).join('')}
              </div>` : ''}
            <div class="comment-input-row">
              <input type="text" placeholder="温柔地留下一句鼓励…" data-input="${p.id}">
              <button data-send="${p.id}">送出</button>
            </div>
          </div>`;
      }).join('');

      ctn.querySelectorAll('.post-card').forEach(card => {
        const id = card.dataset.id;
        card.querySelector('[data-act="like"]').addEventListener('click', () => {
          App.toggleLike(id);
          renderFeed();
        });
        card.querySelector('[data-act="comment"]').addEventListener('click', () => {
          card.querySelector(`[data-input="${id}"]`).focus();
        });
        card.querySelector(`[data-send="${id}"]`).addEventListener('click', () => {
          const inp = card.querySelector(`[data-input="${id}"]`);
          const v = inp.value.trim();
          if (!v) return;
          App.commentPost(id, v);
          inp.value = '';
          renderFeed();
        });
      });
    }

    function escapeHtml(s) {
      return String(s).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
    }

    // ============== 排行榜 ==============
    function renderRank() {
      const arr = App.buildLeaderboard();
      const html = arr.map((u, i) => {
        const rank = i + 1;
        let rankCls = '';
        if (rank === 1) rankCls = 'gold';
        else if (rank === 2) rankCls = 'silver';
        else if (rank === 3) rankCls = 'bronze';
        return `
          <div class="lb-row ${u.isMe ? 'me' : ''}">
            <div class="lb-rank ${rankCls}">${rank}</div>
            <div class="lb-avatar">${u.avatar}</div>
            <div class="lb-info">
              <div class="lb-name">${u.name} ${u.isMe ? '<span class="muted">（我）</span>' : ''}</div>
              <div class="lb-meta">连续 ${u.streak} 天 · 今日完成率 ${u.todayRate}%</div>
            </div>
            <div class="lb-score">${u.score}<span class="unit">分</span></div>
          </div>`;
      }).join('');
      document.getElementById('leaderboard').innerHTML = html;
    }

    // ============== 搭子 / 情侣 ==============
    let buddyType = 'friend';

    function renderBuddy(type) {
      buddyType = type;
      const list = (App.data.buddies || []).filter(b => b.type === type);
      const ctn = (type === 'friend') ? document.getElementById('buddyList') : document.getElementById('coupleArea');
      if (!list.length) {
        ctn.innerHTML = `
          <div class="empty-state">
            <span class="em-emoji">${type === 'couple' ? '💑' : '🤝'}</span>
            ${type === 'couple' ? '还没有绑定情侣，快和 TA 一起开始打卡吧～' : '还没有搭子，快邀请一位朋友一起坚持～'}
          </div>
          <div style="text-align:center;margin-top:12px">
            <button class="btn-primary" style="width:auto;padding:10px 20px" id="addNowBtn">${type === 'couple' ? '+ 绑定 TA' : '+ 添加搭子'}</button>
          </div>`;
        const btn = document.getElementById('addNowBtn');
        if (btn) btn.addEventListener('click', () => openBuddyModal(type));
        return;
      }
      ctn.innerHTML = list.map(b => {
        const rate = b.todayDone ? 100 : 30;
        return `
          <div class="buddy-card ${b.type === 'couple' ? 'couple' : ''}" data-id="${b.id}">
            <div class="buddy-avatar">${b.avatar}</div>
            <div class="buddy-info">
              <div class="buddy-name">${b.name} ${b.type === 'couple' ? '💑' : '🤝'}</div>
              <div class="buddy-meta">连续 ${b.streak} 天 · 今日 ${b.todayDone ? '已打卡 ✓' : '未打卡 ○'} · 邀请码 ${b.code}</div>
              <div class="buddy-progress"><span style="width:${rate}%"></span></div>
            </div>
            <div class="buddy-actions">
              <button class="poke" data-act="poke">戳一下</button>
              <button data-act="del">移除</button>
            </div>
          </div>`;
      }).join('');

      ctn.querySelectorAll('.buddy-card').forEach(card => {
        const id = card.dataset.id;
        card.querySelector('[data-act="poke"]').addEventListener('click', () => {
          App.poke(id);
          App.toast('已戳一下，让 TA 别偷懒～ 🌸');
        });
        card.querySelector('[data-act="del"]').addEventListener('click', () => {
          if (confirm('确定要解除该关系吗？')) {
            App.removeBuddy(id);
            renderBuddy(type);
          }
        });
      });
    }

    // 在 buddy / couple 面板的标题处加按钮（情侣面板没有标题按钮，靠空态按钮）
    document.getElementById('addBuddyBtn').addEventListener('click', () => openBuddyModal('friend'));

    const buddyModal = document.getElementById('buddyModal');
    let myInvite = App.fmt && (App.data.myInvite || ('XG' + Math.random().toString(36).slice(2,8).toUpperCase()));
    function refreshInvite() {
      myInvite = 'XG' + Math.random().toString(36).slice(2,8).toUpperCase();
      document.getElementById('myInviteCode').textContent = myInvite;
    }
    function openBuddyModal(type) {
      buddyType = type;
      document.getElementById('buddyModalTitle').textContent = type === 'couple' ? '💑 绑定 TA' : '🤝 添加搭子';
      document.getElementById('buddyName').value = '';
      document.getElementById('buddyCode').value = '';
      refreshInvite();
      buddyModal.classList.add('show');
    }
    document.getElementById('newInviteBtn').addEventListener('click', refreshInvite);
    document.getElementById('buddyCancel').addEventListener('click', () => buddyModal.classList.remove('show'));
    buddyModal.addEventListener('click', e => {
      if (e.target === buddyModal) buddyModal.classList.remove('show');
    });
    document.getElementById('buddySave').addEventListener('click', () => {
      const name = document.getElementById('buddyName').value.trim();
      const code = document.getElementById('buddyCode').value.trim().toUpperCase();
      if (!name) { App.toast('请填写称呼'); return; }
      if (code) {
        const r = App.bindBuddyByCode(code, name, buddyType);
        if (!r.ok) { App.toast(r.message); return; }
        App.toast('绑定成功 🌷');
      } else {
        App.addBuddy({ name, type: buddyType });
        App.toast('已添加（本地）🌸');
      }
      buddyModal.classList.remove('show');
      renderBuddy(buddyType);
    });

    renderFeed();
  </script>
</body>
</html>
