<body>
  <main class="app-shell fade-in">
    <!-- Hero -->
    <section class="hero-card" id="hero"></section>

    <!-- 今日完成率 -->
    <section class="card">
      <div class="card-title">
        <span class="card-title-text"><span class="icon"></span>今日完成率</span>
        <a class="card-action" href="checkin.html">去打卡 →</a>
      </div>
      <div class="progress-ring-wrap" id="progressBlock"></div>
    </section>

    <!-- 今日计划 -->
    <section class="card">
      <div class="card-title">
        <span class="card-title-text"><span class="icon"></span>今日计划</span>
        <a class="card-action" href="checkin.html">查看全部</a>
      </div>
      <ul class="task-list" id="todayTasksMini"></ul>
    </section>

    <!-- 锦汐 AI 教练快速入口 -->
    <section class="card" style="background: linear-gradient(135deg, #F0F6FE 0%, #FFF0F5 100%);">
      <div class="card-title">
        <span class="card-title-text"><span class="icon"></span>锦汐 AI 教练</span>
        <a class="card-action" href="coach.html">去聊聊 →</a>
      </div>
      <p class="intro-text" style="margin:0">嗨～我是<strong>锦汐</strong> ✨，专属于你的成长教练，可以陪你聊状态、安排任务、监督你不偷懒。</p>
    </section>

    <!-- 入口卡片 -->
    <section class="card" style="background: linear-gradient(135deg, #F0F6FE 0%, #FAFCFF 100%);">
      <div class="card-title">
        <span class="card-title-text"><span class="icon"></span>更多功能</span>
      </div>
      <div class="intro-feats">
        <a class="intro-feat" href="review.html">📝 每日复盘</a>
        <a class="intro-feat" href="report.html">📅 周/月复盘</a>
        <a class="intro-feat" href="ai.html">✨ AI 复盘</a>
        <a class="intro-feat" href="ai.html">🎯 AI 制定计划</a>
        <a class="intro-feat" href="community.html">🌷 社区</a>
        <a class="intro-feat" href="community.html">🏆 排行榜</a>
        <a class="intro-feat" href="community.html">🤝 搭子</a>
        <a class="intro-feat" href="community.html">💑 情侣打卡</a>
      </div>
    </section>
  </main>

  <script src="assets/js/app.js"></script>
  <script src="assets/js/ui.js"></script>
  <script>
    UI.injectShared('home');

    // Hero
    const streak = App.getStreak();
    const total = App.totalCheckinDays();
    document.getElementById('hero').innerHTML = `
      <div class="hero-greet">${App.fmt.greet()}，欢迎回来</div>
      <div class="hero-title">愿你像汐光一样，温柔而坚定 ✨</div>
      <div class="hero-quote">"${App.todayQuote()}"</div>
      <div class="hero-stats">
        <div class="hero-stat"><div class="num">${streak}</div><div class="lbl">连续打卡</div></div>
        <div class="hero-stat"><div class="num">${total}</div><div class="lbl">累计天数</div></div>
        <div class="hero-stat"><div class="num">${App.weekAvgRate()}<span style="font-size:13px">%</span></div><div class="lbl">本周完成率</div></div>
      </div>
    `;

    // 进度环
    const r = App.todayRate();
    document.getElementById('progressBlock').innerHTML = `
      ${UI.progressRing(r.rate, r.rate + '%', '今日进度')}
      <div class="progress-info">
        <div class="big">已完成 ${r.done} / ${r.total} 项任务</div>
        <div class="small">${r.total === 0 ? '快去添加今天的小目标吧～' : (r.rate >= 80 ? '今天表现非常棒 🌷' : (r.rate >= 50 ? '继续保持，已经过半啦' : '一步一步来，慢慢就好'))}</div>
      </div>
    `;

    // 任务迷你列表（最多显示5条）
    const tasks = App.getTodayTasks();
    const mini = document.getElementById('todayTasksMini');
    if (!tasks.length) {
      mini.innerHTML = `<div class="empty-state">
        <span class="em-emoji">🌱</span>
        还没有计划，去<a style="color:var(--primary-deep);font-weight:500" href="checkin.html"> 添加任务 </a>开启今天吧
      </div>`;
    } else {
      mini.innerHTML = tasks.slice(0, 5).map(t => `
        <li class="task-item ${t.done ? 'done' : ''}" data-id="${t.id}">
          <div class="task-check ${t.done ? 'checked' : ''}"></div>
          <div class="task-info">
            <div class="task-name"><span class="task-emoji">${t.emoji || '✨'}</span>${t.name}</div>
          </div>
        </li>
      `).join('');

      mini.addEventListener('click', e => {
        const item = e.target.closest('.task-item');
        if (!item) return;
        App.toggleTask(item.dataset.id);
        location.reload();
      });
    }
  </script>
</body>
</html>
