<!-- Generated by Trae Work -->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#F2F7FE">
  <title>汐光自律 · 每日复盘</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="apple-touch-icon" href="assets/icons/icon.svg">
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
  <main class="app-shell fade-in">
    <section class="hero-card" style="padding:22px 20px">
      <div class="hero-greet">&nbsp;</div>
      <div class="hero-title" id="reviewHeroTitle" style="font-size:18px">写下今天的自己 🌷</div>
      <div class="hero-quote" style="margin-top:10px">用文字记录，是与自己温柔的对话</div>
    </section>

    <section class="card">
      <div class="card-title">
        <span class="card-title-text"><span class="icon"></span>今日复盘</span>
        <span class="card-action" id="autoSavedTag" style="color:var(--accent-mint);display:none">已自动保存</span>
      </div>

      <form class="review-form" id="reviewForm" onsubmit="return false;">
        <div class="field">
          <label class="field-label">
            <span class="field-icon">🌅</span>早起觉察
            <span class="field-help">/ 起床后的状态、感受</span>
          </label>
          <textarea name="wakeup" placeholder="今天几点起床？身体感觉如何？心情怎么样？"></textarea>
        </div>

        <div class="field">
          <label class="field-label">
            <span class="field-icon">😊</span>今日心情
          </label>
          <div class="mood-row" id="moodRow">
            <span class="mood-chip" data-v="🥰"><span class="em">🥰</span>满足</span>
            <span class="mood-chip" data-v="😊"><span class="em">😊</span>愉悦</span>
            <span class="mood-chip" data-v="😌"><span class="em">😌</span>平静</span>
            <span class="mood-chip" data-v="🙂"><span class="em">🙂</span>尚可</span>
            <span class="mood-chip" data-v="😔"><span class="em">😔</span>低落</span>
          </div>
        </div>

        <div class="field">
          <label class="field-label">
            <span class="field-icon">🌱</span>今日收获
            <span class="field-help">/ 任何让你开心或感动的小事</span>
          </label>
          <textarea name="harvest" placeholder="今天学到了什么？哪一刻让你感觉很棒？"></textarea>
        </div>

        <div class="field">
          <label class="field-label">
            <span class="field-icon">💭</span>今日不足
            <span class="field-help">/ 温柔地觉察，不必苛责</span>
          </label>
          <textarea name="weakness" placeholder="今天有哪里可以做得更好？是什么让自己分心？"></textarea>
        </div>

        <div class="field">
          <label class="field-label">
            <span class="field-icon">🎯</span>明日计划
            <span class="field-help">/ 1-3 件最重要的事</span>
          </label>
          <textarea name="plan" placeholder="明天最想完成的 1-3 件事是？"></textarea>
        </div>

        <button class="btn-primary" id="saveBtn">保存今日复盘</button>
        <button class="btn-secondary" id="aiBtn">🪄 让 AI 帮我复盘 →</button>
      </form>
    </section>

    <section class="card" id="historyCard" style="display:none">
      <div class="card-title">
        <span class="card-title-text"><span class="icon"></span>近期复盘记录</span>
      </div>
      <div id="historyList" style="display:flex;flex-direction:column;gap:10px"></div>
    </section>
  </main>

  <script src="assets/js/app.js"></script>
  <script src="assets/js/ui.js"></script>
  <script>
    UI.injectShared('review');

    const review = App.getTodayReview();
    const form = document.getElementById('reviewForm');

    // 填充已有数据
    ['wakeup', 'harvest', 'weakness', 'plan'].forEach(name => {
      const el = form.querySelector(`[name="${name}"]`);
      if (el) el.value = review[name] || '';
    });
    if (review.mood) {
      const chip = document.querySelector(`.mood-chip[data-v="${review.mood}"]`);
      if (chip) chip.classList.add('active');
    }

    // 心情选择
    document.getElementById('moodRow').addEventListener('click', e => {
      const chip = e.target.closest('.mood-chip');
      if (!chip) return;
      document.querySelectorAll('.mood-chip').forEach(c => c.classList.remove('active'));
      chip.classList.add('active');
      autoSave();
    });

    function readForm() {
      return {
        wakeup: form.querySelector('[name=wakeup]').value,
        harvest: form.querySelector('[name=harvest]').value,
        weakness: form.querySelector('[name=weakness]').value,
        plan: form.querySelector('[name=plan]').value,
        mood: document.querySelector('.mood-chip.active')?.dataset.v || ''
      };
    }

    let saveTimer = null;
    function autoSave() {
      clearTimeout(saveTimer);
      saveTimer = setTimeout(() => {
        App.saveReview(readForm());
        const tag = document.getElementById('autoSavedTag');
        tag.style.display = 'inline';
        setTimeout(() => { tag.style.display = 'none'; }, 1500);
      }, 600);
    }

    form.querySelectorAll('textarea, input').forEach(el => el.addEventListener('input', autoSave));

    document.getElementById('saveBtn').addEventListener('click', () => {
      App.saveReview(readForm());
      App.toast('复盘已保存 🌷');
    });

    document.getElementById('aiBtn').addEventListener('click', () => {
      App.saveReview(readForm());
      location.href = 'ai.html?from=review';
    });

    // 历史记录
    const reviews = Object.entries(App.data.reviews || {}).sort((a, b) => b[0].localeCompare(a[0])).slice(0, 5);
    if (reviews.length > 1) { // 多于今天才显示
      document.getElementById('historyCard').style.display = '';
      const list = document.getElementById('historyList');
      list.innerHTML = reviews.filter(([d]) => d !== App.fmt.today()).map(([d, r]) => `
        <div style="background:var(--surface-2);padding:12px 14px;border-radius:var(--r-md)">
          <div style="display:flex;justify-content:space-between;font-size:12px;color:var(--muted);margin-bottom:6px">
            <span>${d}</span><span>${r.mood || ''}</span>
          </div>
          <div style="font-size:13px;color:var(--ink-2);line-height:1.7">
            ${r.harvest ? '🌱 ' + r.harvest.slice(0, 50) + (r.harvest.length > 50 ? '...' : '') : '<span style="color:var(--muted)">暂无收获记录</span>'}
          </div>
        </div>
      `).join('') || '<div class="empty-state" style="padding:18px">暂无历史记录</div>';
    }

    // 修复 hero 中的日期
    document.querySelector('.hero-greet').textContent = App.fmt.dateLabel();
  </script>
</body>
</html>
