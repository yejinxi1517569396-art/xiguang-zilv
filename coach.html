<!-- Generated by Trae Work -->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#F2F7FE">
  <title>汐光自律 · 锦汐AI教练</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="apple-touch-icon" href="assets/icons/icon.svg">
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
  <main class="app-shell fade-in">
    <!-- 教练设定卡 -->
    <section class="card" id="coachSettingCard">
      <div class="card-title">
        <span class="card-title-text"><span class="icon"></span>锦汐 AI 教练 · 个性设定</span>
        <span class="card-action btn-link" id="clearChatBtn">清空对话</span>
      </div>
      <div style="font-size:13px;color:var(--ink-2);margin-bottom:12px">
        我是<strong>锦汐 AI 教练</strong> ✨，负责陪你成长、监督你不偷懒。先告诉我你想要的监督风格吧～
      </div>
      <label class="field-label" style="display:block;margin-bottom:6px">监督严格度</label>
      <div class="strict-toggle" id="strictToggle">
        <div class="opt" data-v="gentle">🌷 温柔陪伴</div>
        <div class="opt" data-v="normal">✨ 务实鼓励</div>
        <div class="opt" data-v="strict">🔥 严格监督</div>
      </div>
      <div class="strict-tip" id="strictTip">温柔陪伴：以鼓励、共情为主，不会指责你。</div>

      <label class="field-label" style="display:block;margin:14px 0 6px">你的目标 / 想坚持的事</label>
      <input type="text" id="goalInput" placeholder="例如：每天 6 点起床 / 三个月减脂 5kg / 一年读完 24 本书"
             style="width:100%;background:var(--surface-2);border:1px solid var(--rule);border-radius:var(--r-md);padding:10px 12px;font-size:14px;outline:none">
    </section>

    <!-- 对话区 -->
    <section class="card" style="padding:16px">
      <div class="card-title">
        <span class="card-title-text"><span class="icon"></span>和锦汐聊聊</span>
      </div>
      <div class="coach-shell" id="chatList"></div>
    </section>
  </main>

  <!-- 底部输入条（固定） -->
  <div class="coach-input-bar">
    <input type="text" id="chatInput" placeholder="说说你的状态，或者请教练给你建议…">
    <button id="chatSendBtn">发送</button>
  </div>

  <script src="assets/js/app.js"></script>
  <script src="assets/js/ui.js"></script>
  <script>
    UI.injectShared('coach');

    // ---------- 严格度 ----------
    const tips = {
      gentle: '温柔陪伴：以鼓励、共情为主，不会指责你。',
      normal: '务实鼓励：温柔的同时，也会给具体行动建议。',
      strict: '严格监督：会直接指出懒惰与借口，并要求你执行。'
    };
    function setStrict(v) {
      App.data.coachSettings.strictness = v;
      App.saveData();
      document.querySelectorAll('#strictToggle .opt').forEach(o => o.classList.toggle('active', o.dataset.v === v));
      document.getElementById('strictTip').textContent = tips[v];
    }
    setStrict(App.data.coachSettings.strictness || 'gentle');
    document.getElementById('strictToggle').addEventListener('click', e => {
      const o = e.target.closest('.opt');
      if (!o) return;
      setStrict(o.dataset.v);
    });

    // ---------- 目标 ----------
    const goalInput = document.getElementById('goalInput');
    goalInput.value = App.data.coachSettings.goalDesc || '';
    goalInput.addEventListener('change', () => {
      App.data.coachSettings.goalDesc = goalInput.value.trim();
      App.saveData();
      App.toast('目标已更新 🌷');
    });

    // ---------- 对话渲染 ----------
    const chatList = document.getElementById('chatList');
    function escapeHtml(s) {
      return String(s).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
    }

    function renderChat() {
      const list = App.data.coachSessions || [];
      if (!list.length) {
        chatList.innerHTML = `
          <div class="coach-empty">
            <span class="em-emoji">✨</span>
            <div>你好呀，我是<strong>锦汐 AI 教练</strong>。</div>
            <div style="margin-top:6px;font-size:13px">告诉我你今天的状态，我会陪你一起想办法。</div>
            <div class="coach-quick" id="quickSuggest">
              <span class="q">我今天没动力，怎么办</span>
              <span class="q">帮我安排今天最重要的 3 件事</span>
              <span class="q">监督我去打卡</span>
              <span class="q">我又熬夜了</span>
            </div>
          </div>`;
        document.querySelectorAll('#quickSuggest .q').forEach(q => {
          q.addEventListener('click', () => {
            document.getElementById('chatInput').value = q.textContent;
            send();
          });
        });
        return;
      }
      chatList.innerHTML = list.map(m => `
        <div class="coach-msg ${m.role === 'coach' ? 'coach' : 'me'}">
          <div class="av">${m.role === 'coach' ? '✨' : '🌸'}</div>
          <div class="coach-bubble">${escapeHtml(m.content)}</div>
        </div>`).join('');
      // 滚动到底
      requestAnimationFrame(() => {
        const shell = document.querySelector('.app-shell');
        shell.scrollTop = shell.scrollHeight;
        window.scrollTo(0, document.body.scrollHeight);
      });
    }
    renderChat();

    // ---------- 发送 ----------
    let sending = false;
    async function send() {
      if (sending) return;
      const input = document.getElementById('chatInput');
      const text = input.value.trim();
      if (!text) return;
      input.value = '';
      sending = true;

      // 先把用户消息渲染出来（askCoach 内部也会 push）
      const tempUser = { id: 'tmp_u_' + Date.now(), role: 'user', content: text, createdAt: Date.now() };
      const sessions = App.data.coachSessions || [];
      sessions.push(tempUser);
      renderChat();
      // 立即移除临时（因为 askCoach 会自己 push 一次正式版）
      sessions.pop();

      // 加 thinking 占位
      const thinkEl = document.createElement('div');
      thinkEl.className = 'coach-msg coach';
      thinkEl.innerHTML = '<div class="av">✨</div><div class="coach-bubble coach-thinking">锦汐正在思考…</div>';
      chatList.appendChild(thinkEl);
      requestAnimationFrame(() => {
        const shell = document.querySelector('.app-shell');
        shell.scrollTop = shell.scrollHeight;
      });

      try {
        await App.askCoach(text);
      } catch (e) {
        App.toast('发送失败');
      } finally {
        sending = false;
        renderChat();
      }
    }
    document.getElementById('chatSendBtn').addEventListener('click', send);
    document.getElementById('chatInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') send();
    });

    // ---------- 清空对话 ----------
    document.getElementById('clearChatBtn').addEventListener('click', () => {
      if (!App.data.coachSessions.length) return;
      if (confirm('确定要清空与锦汐的全部对话吗？')) {
        App.clearCoachSessions();
        renderChat();
        App.toast('已清空');
      }
    });
  </script>
</body>
</html>
