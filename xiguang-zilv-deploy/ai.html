<!-- Generated by Trae Work -->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#F2F7FE">
  <title>汐光自律 · AI 助手</title>
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
  <main class="app-shell fade-in">
    <section class="hero-card" style="padding:22px 20px">
      <div class="hero-greet">✨ AI 助手</div>
      <div class="hero-title" style="font-size:19px">让温柔的智能，陪你成长</div>
      <div class="hero-quote">支持 AI 复盘 / AI 制定计划 · 默认使用本地示例，可在【我的】页填入 OpenAI Key 启用真实 AI</div>
    </section>

    <!-- Tab 切换 -->
    <div class="ai-tab-row">
      <div class="ai-tab active" data-tab="review">🪄 AI 复盘</div>
      <div class="ai-tab" data-tab="plan">🎯 AI 制定计划</div>
    </div>

    <!-- AI 复盘 -->
    <section class="ai-card" id="reviewPanel">
      <div class="card-title" style="margin-bottom:10px">
        <span class="card-title-text"><span class="icon"></span>AI 复盘</span>
      </div>
      <div style="font-size:13px;color:var(--muted);margin-bottom:14px;line-height:1.7">
        AI 会根据你今天的任务完成情况和复盘记录，生成温柔的反馈与建议。
      </div>

      <div class="field" style="margin-bottom:14px">
        <label class="field-label"><span class="field-icon">📝</span>今天的状态（可补充）</label>
        <textarea id="reviewExtra" placeholder="可以再说说今天的感受……（留空也可以）" style="background:var(--surface-2);border:1px solid var(--rule);border-radius:var(--r-md);padding:12px;font-size:14px;outline:none;font-family:inherit;min-height:60px;resize:vertical"></textarea>
      </div>

      <button class="btn-primary" id="genReviewBtn">生成今日 AI 复盘</button>

      <div class="ai-status" id="reviewStatus">
        <span class="ai-dot"></span><span id="reviewStatusText">等待生成…</span>
      </div>

      <div class="ai-output" id="reviewOutput" style="margin-top:14px">
        <span class="ai-placeholder">AI 复盘内容将显示在这里 …</span>
      </div>
    </section>

    <!-- AI 制定计划 -->
    <section class="ai-card" id="planPanel" style="display:none">
      <div class="card-title" style="margin-bottom:10px">
        <span class="card-title-text"><span class="icon"></span>AI 制定计划</span>
      </div>
      <div style="font-size:13px;color:var(--muted);margin-bottom:14px;line-height:1.7">
        告诉 AI 你的目标，让它为你定制每日时间表。
      </div>

      <div class="field" style="margin-bottom:12px">
        <label class="field-label"><span class="field-icon">🎯</span>你的目标</label>
        <input type="text" id="goalInput" placeholder="例如：3 个月内学会日语五十音 / 减重 5 公斤 / 每日早起阅读" style="background:var(--surface-2);border:1px solid var(--rule);border-radius:var(--r-md);padding:12px 14px;font-size:14px;outline:none">
      </div>

      <div class="preset-tags" style="margin-bottom:14px">
        <span class="preset-tag" data-goal="坚持每日早起 6:30">🌅 早起 6:30</span>
        <span class="preset-tag" data-goal="3 个月内减重 5 公斤">⚖️ 健康减重</span>
        <span class="preset-tag" data-goal="每天阅读 30 分钟">📖 每日阅读</span>
        <span class="preset-tag" data-goal="坚持运动 21 天">🏃‍♀️ 21 天运动</span>
      </div>

      <button class="btn-primary" id="genPlanBtn">生成每日计划</button>

      <div class="ai-status" id="planStatus">
        <span class="ai-dot"></span><span id="planStatusText">等待生成…</span>
      </div>

      <div class="ai-output" id="planOutput" style="margin-top:14px">
        <span class="ai-placeholder">AI 计划将显示在这里 …</span>
      </div>
    </section>

    <!-- 历史 AI 计划 -->
    <section class="card" id="planHistoryCard" style="display:none">
      <div class="card-title">
        <span class="card-title-text"><span class="icon"></span>历史 AI 计划</span>
      </div>
      <div id="planHistoryList" style="display:flex;flex-direction:column;gap:10px"></div>
    </section>
  </main>

  <script src="assets/js/app.js"></script>
  <script src="assets/js/ui.js"></script>
  <script>
    UI.injectShared('ai');

    // Tab 切换
    document.querySelectorAll('.ai-tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.ai-tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        const k = tab.dataset.tab;
        document.getElementById('reviewPanel').style.display = k === 'review' ? '' : 'none';
        document.getElementById('planPanel').style.display = k === 'plan' ? '' : 'none';
        document.getElementById('planHistoryCard').style.display = k === 'plan' && App.data.aiPlans.length ? '' : 'none';
      });
    });

    // 若来自复盘页，自动跳到复盘 tab 并尝试生成
    const params = new URLSearchParams(location.search);
    if (params.get('from') === 'review') {
      // 已默认在 review tab，无需切换
    }

    // ---- AI 复盘 ----
    document.getElementById('genReviewBtn').addEventListener('click', async () => {
      const review = App.getTodayReview();
      const extra = document.getElementById('reviewExtra').value;
      const tasks = App.getTodayTasks();
      const r = App.todayRate();

      const messages = [
        { role: 'system', content: '你是一位温柔、知性、富有同理心的成长教练，名字叫"汐光"。请用温柔、不评判、富有共情的语气陪伴用户复盘。' },
        { role: 'user', content: `请帮我做今日复盘。
今天日期：${App.fmt.today()}
完成情况：${r.done}/${r.total} 项 (${r.rate}%)
任务清单：${tasks.map(t => `${t.done ? '✓' : '○'} ${t.name}`).join('，')}
早起觉察：${review.wakeup || '未记录'}
今日心情：${review.mood || '未选择'}
今日收获：${review.harvest || '未记录'}
今日不足：${review.weakness || '未记录'}
明日计划：${review.plan || '未记录'}
补充说明：${extra}

请用温柔的语气给出 4 个部分：1) 对今天的肯定 2) 对感受的共情 3) 对不足的温柔建议 4) 给明天的 2-3 个具体小步骤。结尾给一句鼓励的话。` }
      ];

      setStatus('reviewStatusText', '✨ AI 正在思考…');
      document.getElementById('genReviewBtn').disabled = true;
      const mockText = App.mockAIReview({ ...review, extra });
      const result = await App.callAI(messages, mockText);
      document.getElementById('genReviewBtn').disabled = false;

      const out = document.getElementById('reviewOutput');
      out.textContent = result.text;

      if (result.mock) setStatus('reviewStatusText', '🌷 当前为本地示例（在【我的】填入 Key 后自动调用真实 AI）');
      else setStatus('reviewStatusText', '✓ 已由 AI 生成');

      // 保存
      App.data.aiReviews.unshift({
        id: 'r_' + Date.now(),
        date: App.fmt.today(),
        content: result.text,
        createdAt: Date.now()
      });
      if (App.data.aiReviews.length > 20) App.data.aiReviews.length = 20;
      App.saveData();
    });

    // ---- AI 计划 ----
    document.querySelectorAll('#planPanel .preset-tag').forEach(tag => {
      tag.addEventListener('click', () => {
        document.getElementById('goalInput').value = tag.dataset.goal;
      });
    });

    document.getElementById('genPlanBtn').addEventListener('click', async () => {
      const goal = document.getElementById('goalInput').value.trim();
      if (!goal) { App.toast('请输入你的目标'); return; }

      const messages = [
        { role: 'system', content: '你是一位温柔、专业的个人成长规划师"汐光"，擅长把抽象目标拆解为可执行的每日计划。' },
        { role: 'user', content: `请为我制定一份达成"${goal}"的每日计划。要求：
1) 分晨间 / 上午 / 午后 / 晚间 4 个时段
2) 每个时段 2-4 个具体动作（含具体时长）
3) 给出每周复盘建议
4) 用温柔鼓励的语气` }
      ];

      setStatus('planStatusText', '✨ AI 正在为你定制计划…');
      document.getElementById('genPlanBtn').disabled = true;
      const mockText = App.mockAIPlan(goal);
      const result = await App.callAI(messages, mockText);
      document.getElementById('genPlanBtn').disabled = false;

      const out = document.getElementById('planOutput');
      out.textContent = result.text;

      if (result.mock) setStatus('planStatusText', '🌷 当前为本地示例（在【我的】填入 Key 后自动调用真实 AI）');
      else setStatus('planStatusText', '✓ 已由 AI 生成');

      // 存历史
      App.data.aiPlans.unshift({
        id: 'p_' + Date.now(),
        goal,
        plan: result.text,
        createdAt: Date.now()
      });
      if (App.data.aiPlans.length > 10) App.data.aiPlans.length = 10;
      App.saveData();
      renderPlanHistory();
    });

    function setStatus(id, msg) {
      document.getElementById(id).textContent = msg;
    }

    function renderPlanHistory() {
      const list = App.data.aiPlans;
      if (!list.length) return;
      const card = document.getElementById('planHistoryCard');
      const isPlanTab = document.querySelector('.ai-tab.active').dataset.tab === 'plan';
      card.style.display = isPlanTab ? '' : 'none';
      document.getElementById('planHistoryList').innerHTML = list.map(p => `
        <div style="background:var(--surface-2);padding:12px 14px;border-radius:var(--r-md)">
          <div style="font-size:13px;font-weight:600;color:var(--primary-deep);margin-bottom:4px">🎯 ${p.goal}</div>
          <div style="font-size:11px;color:var(--muted);margin-bottom:8px">${new Date(p.createdAt).toLocaleString('zh-CN')}</div>
          <div style="font-size:12px;color:var(--ink-2);line-height:1.7;white-space:pre-wrap;max-height:120px;overflow:auto">${p.plan.slice(0, 200)}${p.plan.length > 200 ? '…' : ''}</div>
        </div>
      `).join('');
    }
    renderPlanHistory();
  </script>
</body>
</html>
