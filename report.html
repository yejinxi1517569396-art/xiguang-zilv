<!-- Generated by Trae Work -->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#F2F7FE">
  <title>汐光自律 · 成长报告</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="apple-touch-icon" href="assets/icons/icon.svg">
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
  <main class="app-shell fade-in">
    <div class="sub-tabs" id="subTabs">
      <div class="sub-tab active" data-tab="week">📅 周复盘</div>
      <div class="sub-tab" data-tab="month">🌙 月复盘</div>
    </div>

    <section class="card">
      <div class="card-title">
        <span class="card-title-text"><span class="icon"></span>自动生成成长报告</span>
      </div>
      <p class="intro-text" style="margin-bottom:12px">
        基于你最近的打卡数据与每日复盘，由<strong>锦汐 AI 教练</strong>帮你生成温柔的复盘报告。
      </p>
      <div class="report-actions">
        <button id="genWeek">✨ 生成本周复盘</button>
        <button class="ghost" id="genMonth">🌙 生成本月复盘</button>
      </div>
    </section>

    <div id="paneWeek" class="pane">
      <div class="section-title">本周·历史</div>
      <div id="weekList"></div>
    </div>

    <div id="paneMonth" class="pane" style="display:none">
      <div class="section-title">本月·历史</div>
      <div id="monthList"></div>
    </div>
  </main>

  <script src="assets/js/app.js"></script>
  <script src="assets/js/ui.js"></script>
  <script>
    UI.injectShared('home');

    document.getElementById('subTabs').addEventListener('click', e => {
      const t = e.target.closest('.sub-tab');
      if (!t) return;
      document.querySelectorAll('#subTabs .sub-tab').forEach(x => x.classList.toggle('active', x === t));
      const k = t.dataset.tab;
      document.getElementById('paneWeek').style.display = (k === 'week') ? '' : 'none';
      document.getElementById('paneMonth').style.display = (k === 'month') ? '' : 'none';
    });

    function escapeHtml(s) {
      return String(s).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
    }

    function renderWeek() {
      const list = App.listWeekReviews();
      const ctn = document.getElementById('weekList');
      if (!list.length) {
        ctn.innerHTML = '<div class="report-empty">还没有周复盘，点击上方"生成本周复盘"试试 🌷</div>';
        return;
      }
      ctn.innerHTML = list.map(r => `
        <div class="report-card">
          <div class="key">${r.key} · ${new Date(r.generatedAt).toLocaleString('zh-CN')} ${r.mode === 'mock' ? '· 本地示例' : '· AI 生成'}</div>
          <div class="content">${escapeHtml(r.content)}</div>
        </div>`).join('');
    }
    function renderMonth() {
      const list = App.listMonthReviews();
      const ctn = document.getElementById('monthList');
      if (!list.length) {
        ctn.innerHTML = '<div class="report-empty">还没有月复盘，点击上方"生成本月复盘"试试 🌙</div>';
        return;
      }
      ctn.innerHTML = list.map(r => `
        <div class="report-card">
          <div class="key">${r.key} · ${new Date(r.generatedAt).toLocaleString('zh-CN')} ${r.mode === 'mock' ? '· 本地示例' : '· AI 生成'}</div>
          <div class="content">${escapeHtml(r.content)}</div>
        </div>`).join('');
    }
    renderWeek();
    renderMonth();

    document.getElementById('genWeek').addEventListener('click', async () => {
      App.toast('正在生成本周复盘…');
      await App.generateWeekReview();
      App.toast('完成 🌷');
      renderWeek();
      // 切到周
      document.querySelector('#subTabs .sub-tab[data-tab="week"]').click();
    });
    document.getElementById('genMonth').addEventListener('click', async () => {
      App.toast('正在生成本月复盘…');
      await App.generateMonthReview();
      App.toast('完成 🌙');
      renderMonth();
      document.querySelector('#subTabs .sub-tab[data-tab="month"]').click();
    });
  </script>
</body>
</html>
